<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
  <title>달고나 게임 🍬</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0500; }
    body { display: flex; justify-content: center; align-items: center; touch-action: none; user-select: none; }
    #gameCanvas { display: block; touch-action: none; cursor: crosshair; }

    #nameOverlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.78); z-index: 10;
      justify-content: center; align-items: center; flex-direction: column;
    }
    #nameOverlay.active { display: flex; }
    #nameOverlay .box {
      background: #2a1000; border: 2px solid #c8860a;
      border-radius: 16px; padding: 32px 28px; text-align: center; width: 300px;
    }
    #nameOverlay h2 { color: #ffcc00; font-size: 22px; margin-bottom: 10px; }
    #nameOverlay p  { color: rgba(255,255,255,0.65); font-size: 13px; margin-bottom: 16px; }
    #nameInput {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1.5px solid #c8860a; background: #1a0800;
      color: #fff; font-size: 18px; text-align: center; margin-bottom: 14px; outline: none;
    }
    .overlay-btn {
      width: 100%; padding: 12px; border-radius: 8px; border: none;
      font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 8px;
    }
    .overlay-btn.primary   { background: #c8860a; color: #fff; }
    .overlay-btn.secondary { background: #3d1a00; color: #ffcc00; }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="nameOverlay">
  <div class="box">
    <h2>🏆 점수 저장</h2>
    <p>랭킹 보드에 남길 닉네임을 입력하세요</p>
    <input id="nameInput" type="text" maxlength="8" placeholder="닉네임 (최대 8자)">
    <button class="overlay-btn primary"   id="saveName">💾 저장하기</button>
    <button class="overlay-btn secondary" id="skipSave">저장 안 함</button>
  </div>
</div>

<script>
/* ============================================================
   달고나 게임 v2 — index.html
   Purpose : 모바일/PC 브라우저용 달고나 바늘 찍기 게임 (정교한 순차 메카닉)
   Mechanic:
     - 모양 윤곽선을 따라 배치된 점들을 순서대로 하나씩 찍기
     - 현재 찍어야 할 점(next dot)만 인식 — 순서 틀리면 무반응
     - 현재 점에서 너무 멀리 찍으면 균열 발생
     - 조금씩 조금씩 떼어내는 정교한 바늘 찍기 감각 구현
   Features:
     - 5가지 모양 / 목숨 3개 / 60초 제한
     - 완료 궤적(금색 선) + 남은 점(흰 점) + 현재 점(맥동 링)
     - 바늘 커서 (마지막 탭 위치 표시)
     - 파티클·균열·흔들림 이펙트
     - 로컬스토리지 랭킹 보드 (상위 10명)
   Tech  : HTML5 Canvas 단일 파일, 외부 의존성 없음
   ============================================================ */

// ── 캔버스 ──────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

/* BASE_W는 가상 캔버스 기준 너비 (고정).
   BASE_H는 실제 화면 비율에 맞게 동적으로 계산됨.
   scale은 "가상 1px = 실제 몇 px"인지를 나타냄. */
let BASE_W = 400, BASE_H = 700;
let scale = 1;

function resizeCanvas() {
  const W = window.innerWidth;
  const H = window.innerHeight;

  /* guard: W 또는 H가 0이거나 비정상이면 스킵 (scale=0 → Infinity 전파 방지) */
  if (!W || !H || !isFinite(W) || !isFinite(H)) return;

  if (H >= W * 1.1) {
    /* ── 세로 모드 (모바일·타블렛 세로) ──────────────────────
       너비를 꽉 채우고, 가상 높이는 실제 화면 비율에 맞춤.
       달고나가 화면 너비의 74%를 차지해 크게 보임.          */
    scale  = W / BASE_W;
    BASE_H = Math.ceil(H / scale);
    canvas.width  = W;
    canvas.height = H;
  } else {
    /* ── 가로 모드 (PC·노트북·태블릿 가로) ───────────────────
       400×700 기준 레이아웃을 화면 안에 딱 맞게 축소.
       가로로 넘치거나 세로 스크롤이 생기지 않음.            */
    BASE_H = 700;
    scale  = Math.min(W / BASE_W, H / BASE_H);
    canvas.width  = Math.round(BASE_W * scale);
    canvas.height = Math.round(BASE_H * scale);
  }

  ctx.setTransform(scale, 0, 0, scale, 0, 0);
  initLayout();
}
window.addEventListener('resize', resizeCanvas);
// ※ 초기 호출은 아래 let 변수 선언 후에 실행 (temporal dead zone 방지)

// ── 팔레트 ──────────────────────────────────────────────────
const C = {
  bg:         '#0d0500',
  candy:      '#c8860a',
  candyL:     '#e8a020',
  candyD:     '#7a4c04',
  candyHL:    '#f5c842',
  gold:       '#ffcc00',
  red:        '#ff4444',
  green:      '#44ff88',
  white:      'rgba(255,255,255,0.92)',
};

// ── 모양 설정 ───────────────────────────────────────────────
const SHAPES    = ['circle','triangle','star','heart','umbrella'];

const SHAPE_ICO = { circle:'⭕', triangle:'▲', star:'⭐', heart:'❤️', umbrella:'☂️' };
const SHAPE_DIF = { circle:1, triangle:2, star:4, heart:3, umbrella:4 };

/* ── 다국어 번역 (KO / EN) ────────────────────────────────── */
const T = {
  ko: {
    title: '달고나', subtitle: '🍬 바늘로 찍기 게임 🍬',
    gameHint: '달고나 선 위의 점을 찍어 모양을 완성하세요!',

    goBtn: '✓  시작하기',       backBtn: '← 뒤로',

    overlayTitle: '🏆 점수 저장', overlayDesc: '랭킹 보드에 남길 닉네임을 입력하세요',
    namePH: '닉네임 (최대 8자)', saveBtn: '💾 저장하기', skipBtn: '저장 안 함',

  },

    gameHint: 'Pick all the dots along the shape outline!',
    bestRecord: '🏆 Best',
    startBtn: '▶  Start Game',  rankBtn: '🏆  Leaderboard',
    selectTitle: 'Choose Shape', selectSub: 'Pick your dalgona candy shape',
    goBtn: "✓  Let's Go",        backBtn: '← Back',
    ready: 'Ready!',
    successTxt: '🎉 Success!',
    pts: 'pts',  timeSfx: 's',  doneTxt: ' done',
    saveRankBtn: '💾 Save & Rankings', retryBtn: '🔄 Play Again',
    failedTxt: '💥 Failed!',
    retryAgain: '🔄 Try Again!', changeShape: 'Change Shape', mainMenu: 'Main Menu',
    lbTitle: '🏆 Leaderboard',
    scoreTop: '🏅  Top Score  TOP 5', speedTop: '⚡  Fastest  TOP 5',
    noRecord: 'No records yet',  backMenu: '← Main Menu',
    overlayTitle: '🏆 Save Score', overlayDesc: 'Enter a nickname for the leaderboard',
    namePH: 'Nickname (max 8)', saveBtn: '💾 Save', skipBtn: 'Skip',
    touchHint: 'Hold & aim → lift to pick',
    dotsPts: n => `${n}pts`,
    shapes: { circle:'Circle', triangle:'Triangle', star:'Star', heart:'Heart', umbrella:'Umbrella' },
  },
};

/* 점 개수 — 많을수록 더 세밀한 찍기 필요 */
const SHAPE_N   = { circle:60, triangle:54, star:80, heart:70, umbrella:64 };

/* 게임 요소 위치/크기 — initLayout()에서 화면 크기에 맞게 계산 */
let CANDY_CX = BASE_W / 2;
let CANDY_CY = BASE_H * 0.40;
let CANDY_R  = 148;   // BASE_W * 0.37
let SHAPE_SZ = 77;    // CANDY_R * 0.52

/* 인식 반지름 — SHAPE_SZ에 비례 (initLayout에서 재계산) */
let HIT_R_BASE = { circle:24, triangle:22, star:18, heart:20, umbrella:20 };
let WRONG_R = 26;

/* 화면 크기에 맞춰 레이아웃 재계산 */
function initLayout() {
  CANDY_CX = BASE_W / 2;
  CANDY_CY = BASE_H * 0.40;          // 살짝 위로 — 엄지가 가리지 않도록
  CANDY_R  = Math.round(BASE_W * 0.37);  // 화면 너비의 74%가 달고나 지름
  SHAPE_SZ = Math.round(CANDY_R * 0.52);
  // 인식 반지름도 SHAPE_SZ에 비례
  const hr = SHAPE_SZ / 68;
  HIT_R_BASE = {
    circle:   Math.round(22 * hr),
    triangle: Math.round(20 * hr),
    star:     Math.round(16 * hr),
    heart:    Math.round(18 * hr),
    umbrella: Math.round(18 * hr),
  };
  WRONG_R = Math.round(24 * hr);
}

resizeCanvas();   // let 변수 선언 완료 후 초기 실행

const MAX_LIVES = 3;
/* 시간 제한 없음 — 스톱워치로 완성 시간을 잼 */

// ── 게임 상태 ───────────────────────────────────────────────
let state        = 'menu';
let currentShape = 'star';
let selectedIdx  = 2;

let dots    = [];        // 모양 위의 점 배열 [{x,y}]
let hitSet  = new Set(); // 이미 찍은 점의 인덱스 집합
let lives        = MAX_LIVES;
let elapsedTime  = 0;   // 스톱워치: 게임 시작부터 경과한 초 (0.1초 단위로 증가)
let finalScore   = 0;
let cracks       = [];
let particles    = [];
let shakeT       = 0;
let countdownT   = 0;
let needleX = -999, needleY = -999, needleAlpha = 0; // 바늘 커서
let wrongFlash   = 0;   // 잘못 찍었을 때 빨간 플래시
let pendingSaveScore = 0;
let pendingSaveShape = '';
let pendingSaveTime  = 0;   // 완성까지 걸린 시간 (초)
let timerID = null;

/* 언어 설정 — localStorage에 저장해 다음 방문 시에도 유지 */
let lang = localStorage.getItem('dalgona_lang') || 'ko';  // 'ko' | 'en'

// ── 로컬 랭킹 ───────────────────────────────────────────────
/* 저장 구조: { name, shape, score, time, date }
   score : 높을수록 좋음   (내림차순)
   time  : 낮을수록 좋음   (오름차순, 완성까지 걸린 초) */
function getLB() {
  try { return JSON.parse(localStorage.getItem('dalgona_lb3') || '[]'); }
  catch { return []; }
}
function saveLB(name, shape, score, time) {
  const lb = getLB();
  lb.push({ name, shape, score, time, date: new Date().toLocaleDateString('ko-KR') });
  lb.splice(50);  // 최대 50개 보관 (두 카테고리 모두 top5 확보)
  localStorage.setItem('dalgona_lb3', JSON.stringify(lb));
}
/* 점수 TOP 5 */
function getScoreTop5() {
  return [...getLB()].sort((a,b) => b.score - a.score).slice(0, 5);
}
/* 속도 TOP 5 (완성 기록만, time이 있는 항목) */
function getSpeedTop5() {
  return getLB().filter(e => e.time != null)
                .sort((a,b) => a.time - b.time)
                .slice(0, 5);
}

// ── 모양 점 생성기 ──────────────────────────────────────────
function circlePoints(cx, cy, r, n) {
  return Array.from({length:n}, (_,i) => {
    const a = (i/n)*Math.PI*2 - Math.PI/2;
    return { x: cx+Math.cos(a)*r, y: cy+Math.sin(a)*r };
  });
}

function trianglePoints(cx, cy, sz, n) {
  const v = [
    {x:cx,              y:cy-sz},
    {x:cx+sz*0.866,     y:cy+sz*0.5},
    {x:cx-sz*0.866,     y:cy+sz*0.5},
  ];
  const pts=[], perSide=Math.floor(n/3);
  for(let s=0;s<3;s++){
    const a=v[s], b=v[(s+1)%3];
    for(let i=0;i<perSide;i++){
      const t=i/perSide;
      pts.push({x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t});
    }
  }
  return pts;
}

function starPoints(cx, cy, R, r, n) {
  const total=10;
  const verts=Array.from({length:total},(_,i)=>{
    const a=(i/total)*Math.PI*2-Math.PI/2;
    const rad=i%2===0?R:r;
    return {x:cx+Math.cos(a)*rad, y:cy+Math.sin(a)*rad};
  });
  const pts=[], perSeg=Math.floor(n/total);
  for(let s=0;s<total;s++){
    const a=verts[s], b=verts[(s+1)%total];
    for(let i=0;i<perSeg;i++){
      const t=i/perSeg;
      pts.push({x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t});
    }
  }
  return pts;
}

function heartPoints(cx, cy, sz, n) {
  return Array.from({length:n},(_,i)=>{
    const t=(i/n)*Math.PI*2;
    const hx=16*Math.pow(Math.sin(t),3);
    const hy=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
    const s2=sz/17;
    return {x:cx+hx*s2, y:cy+hy*s2};
  });
}

function umbrellaPoints(cx, cy, sz, n) {
  const pts=[];
  const topN=Math.floor(n*0.55);
  const straightN=Math.floor(n*0.25);
  const hookN=n-topN-straightN;
  for(let i=0;i<=topN;i++){
    const a=Math.PI+(i/topN)*Math.PI;
    pts.push({x:cx+Math.cos(a)*sz, y:cy+Math.sin(a)*sz*0.85});
  }
  for(let i=1;i<=straightN;i++){
    pts.push({x:cx, y:cy+(i/straightN)*sz*0.65});
  }
  const hY=cy+sz*0.65;
  for(let i=0;i<hookN;i++){
    const a=-Math.PI/2+(i/Math.max(hookN-1,1))*Math.PI;
    pts.push({x:cx+Math.cos(a)*sz*0.22, y:hY+Math.sin(a)*sz*0.22});
  }
  return pts;
}

function makePoints(shape) {
  const n=SHAPE_N[shape];
  switch(shape){
    case 'circle':   return circlePoints(CANDY_CX,CANDY_CY,SHAPE_SZ,n);
    case 'triangle': return trianglePoints(CANDY_CX,CANDY_CY,SHAPE_SZ,n);
    case 'star':     return starPoints(CANDY_CX,CANDY_CY,SHAPE_SZ,SHAPE_SZ*0.42,n);
    case 'heart':    return heartPoints(CANDY_CX,CANDY_CY,SHAPE_SZ,n);
    case 'umbrella': return umbrellaPoints(CANDY_CX,CANDY_CY,SHAPE_SZ,n);
  }
}

// ── UI 헬퍼 ────────────────────────────────────────────────
function rRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawBtn(cx,cy,w,h,label,bg,fg,alpha=1){
  /* guard: 좌표가 비정상이면 그리기 스킵 (BASE_H=Infinity 등 방지) */
  if(!isFinite(cx) || !isFinite(cy) || !isFinite(w) || !isFinite(h)) return;
  ctx.save(); ctx.globalAlpha=alpha;
  const x=cx-w/2, y=cy-h/2;
  ctx.shadowColor='rgba(0,0,0,0.4)'; ctx.shadowBlur=8; ctx.shadowOffsetY=3;
  const g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,lighten(bg,28)); g.addColorStop(1,bg);
  ctx.fillStyle=g; rRect(x,y,w,h,h/2); ctx.fill();
  ctx.shadowBlur=0; ctx.shadowOffsetY=0;
  ctx.strokeStyle='rgba(255,200,80,0.3)'; ctx.lineWidth=1.2;
  rRect(x,y,w,h,h/2); ctx.stroke();
  ctx.font=`bold ${Math.min(h*0.42,18)}px Arial`;
  ctx.fillStyle=fg; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label,cx,cy+1);
  ctx.restore();
}

function lighten(hex,amt){
  if(!hex.startsWith('#')) return hex;
  const n=parseInt(hex.slice(1),16);
  return `rgb(${Math.min(255,(n>>16)+amt)},${Math.min(255,((n>>8)&0xff)+amt)},${Math.min(255,(n&0xff)+amt)})`;
}

function inBtn(tx,ty,cx,cy,w,h){
  return Math.abs(tx-cx)<w/2 && Math.abs(ty-cy)<h/2;
}

// ── 달고나 드로잉 ───────────────────────────────────────────
function drawCandy(cx, cy, r) {
  const g=ctx.createRadialGradient(cx-r*0.28,cy-r*0.28,r*0.05,cx,cy,r);
  g.addColorStop(0,C.candyHL); g.addColorStop(0.3,C.candyL);
  g.addColorStop(0.75,C.candy); g.addColorStop(1,C.candyD);
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  ctx.save(); ctx.globalAlpha=0.36; ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.ellipse(cx-r*0.27,cy-r*0.33,r*0.13,r*0.07,-Math.PI/4.5,0,Math.PI*2);
  ctx.fill(); ctx.restore();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle=C.candyD; ctx.lineWidth=2.5; ctx.stroke();
}

function drawCracks(){
  cracks.forEach(c=>{
    ctx.save(); ctx.beginPath();
    ctx.moveTo(c.x1,c.y1);
    c.segs.forEach(s=>ctx.lineTo(s.x,s.y));
    ctx.strokeStyle=`rgba(55,18,0,${c.op})`;
    ctx.lineWidth=c.w; ctx.lineCap='round'; ctx.stroke();
    ctx.restore();
  });
}

// ── 모양 가이드선 (희미한 점선) ─────────────────────────────
function drawShapeGuide(shape){
  ctx.save(); ctx.globalAlpha=0.25; ctx.setLineDash([3,5]);
  ctx.strokeStyle='#3d1a00'; ctx.lineWidth=1.8;
  ctx.beginPath();
  switch(shape){
    case 'circle': ctx.arc(CANDY_CX,CANDY_CY,SHAPE_SZ,0,Math.PI*2); break;
    case 'triangle':{
      const v=[{x:CANDY_CX,y:CANDY_CY-SHAPE_SZ},{x:CANDY_CX+SHAPE_SZ*0.866,y:CANDY_CY+SHAPE_SZ*0.5},{x:CANDY_CX-SHAPE_SZ*0.866,y:CANDY_CY+SHAPE_SZ*0.5}];
      ctx.moveTo(v[0].x,v[0].y); v.forEach(p=>ctx.lineTo(p.x,p.y)); ctx.closePath(); break;
    }
    case 'star':{
      const total=10,R=SHAPE_SZ,r=SHAPE_SZ*0.42;
      for(let i=0;i<total;i++){const a=(i/total)*Math.PI*2-Math.PI/2,rad=i%2===0?R:r,x=CANDY_CX+Math.cos(a)*rad,y=CANDY_CY+Math.sin(a)*rad;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
      ctx.closePath(); break;
    }
    case 'heart':{
      const pts=heartPoints(CANDY_CX,CANDY_CY,SHAPE_SZ,60);
      ctx.moveTo(pts[0].x,pts[0].y); pts.forEach(p=>ctx.lineTo(p.x,p.y)); ctx.closePath(); break;
    }
    case 'umbrella':{
      const pts=umbrellaPoints(CANDY_CX,CANDY_CY,SHAPE_SZ,50);
      ctx.moveTo(pts[0].x,pts[0].y); pts.forEach(p=>ctx.lineTo(p.x,p.y)); break;
    }
  }
  ctx.stroke(); ctx.setLineDash([]); ctx.restore();
}

// ── 바늘 설정 ───────────────────────────────────────────────
/* 손가락이 화면을 가려도 바늘 끝이 어디를 찌르는지 보이도록
   실제 터치 위치보다 위쪽에 바늘 끝을 배치한다.
   hit detection도 손가락 위치가 아닌 바늘 끝 위치 기준.       */
const NEEDLE_LEN   = 62;                    // 가상단위 — 손잡이→끝 거리
const NEEDLE_ANGLE = 13 * Math.PI / 180;    // 기울기 13도 (자연스러운 쥠 각도)

/* 손가락(터치) 좌표 → 바늘 끝 좌표 변환 */
function needleTip(fx, fy) {
  return {
    x: fx - NEEDLE_LEN * Math.sin(NEEDLE_ANGLE),
    y: fy - NEEDLE_LEN * Math.cos(NEEDLE_ANGLE),
  };
}

/* 바늘 그래픽 렌더링 */
function drawNeedle() {
  if(needleAlpha <= 0.01) return;
  /* guard: needleX/Y가 Infinity/NaN이면 createLinearGradient 에러 방지 */
  if(!isFinite(needleX) || !isFinite(needleY)) return;
  const tip = needleTip(needleX, needleY);

  ctx.save();
  ctx.globalAlpha = Math.min(needleAlpha, 1);

  /* 바늘 몸통 — 손잡이(갈색)→끝(은백색) 그라디언트 */
  const grad = ctx.createLinearGradient(needleX, needleY, tip.x, tip.y);
  grad.addColorStop(0,   'rgba(140, 80, 30, 0.95)');   // 손잡이
  grad.addColorStop(0.35,'rgba(200,200,200, 0.97)');   // 몸통
  grad.addColorStop(1,   'rgba(255,255,255, 1.0)');    // 끝
  ctx.beginPath();
  ctx.moveTo(needleX, needleY);
  ctx.lineTo(tip.x, tip.y);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 2.4;
  ctx.lineCap = 'round';
  ctx.stroke();

  /* 손잡이 끝 — 작은 원형 그립 */
  ctx.beginPath();
  ctx.arc(needleX, needleY, 5, 0, Math.PI * 2);
  const gGrip = ctx.createRadialGradient(needleX-1,needleY-1,0, needleX,needleY,5);
  gGrip.addColorStop(0, '#d4945a');
  gGrip.addColorStop(1, '#7a4010');
  ctx.fillStyle = gGrip;
  ctx.fill();

  /* 바늘 끝 — 빛나는 포인트 (여기가 실제 찌르는 곳!) */
  ctx.shadowColor = 'rgba(255,220,80,0.9)';
  ctx.shadowBlur  = 10;
  ctx.beginPath();
  ctx.arc(tip.x, tip.y, 2.8, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.shadowBlur = 0;

  /* 끝 위치 십자 가이드 (아주 살짝) */
  ctx.globalAlpha = needleAlpha * 0.4;
  ctx.strokeStyle = 'rgba(255,230,100,0.9)';
  ctx.lineWidth = 1;
  const cs = 4;
  ctx.beginPath();
  ctx.moveTo(tip.x-cs, tip.y); ctx.lineTo(tip.x+cs, tip.y);
  ctx.moveTo(tip.x, tip.y-cs); ctx.lineTo(tip.x, tip.y+cs);
  ctx.stroke();

  ctx.restore();
  needleAlpha *= 0.96;   // 손 뗀 후 서서히 사라짐 (약 2초 — 다음 조준 전까지 위치 확인 가능)
}

// ── 핵심 시각화: 점·궤적·바늘 ─────────────────────────────
function drawDotsAndTrail(ts) {
  const total = dots.length;
  const pulse = 0.6 + 0.4 * Math.sin(ts * 0.005);

  /* ① 찍힌 점들을 인덱스 순으로 연결 — 모양이 점점 살아남 */
  if(hitSet.size > 1){
    const sorted = [...hitSet].sort((a,b) => a-b);
    ctx.save();
    ctx.strokeStyle = 'rgba(255,200,0,0.9)';
    ctx.lineWidth = 2.4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.shadowColor = 'rgba(255,180,0,0.5)'; ctx.shadowBlur = 7;
    ctx.beginPath();
    let firstSeg = true;
    for(let k = 0; k < sorted.length; k++){
      const d = dots[sorted[k]];
      if(firstSeg){ ctx.moveTo(d.x, d.y); firstSeg = false; }
      else {
        // 인덱스가 연속할 때만 선으로 연결, 떨어진 구간은 새 세그먼트
        const gap = sorted[k] - sorted[k-1];
        if(gap === 1) ctx.lineTo(d.x, d.y);
        else          ctx.moveTo(d.x, d.y);
      }
    }
    ctx.stroke(); ctx.restore();
  }

  /* ② 점 그리기 — 찍힌 것: 금색 / 안 찍힌 것: 흰 점 (모두 동등하게 보임) */
  for(let i = 0; i < total; i++){
    const d = dots[i];
    if(hitSet.has(i)){
      /* 찍힌 점 — 작은 금색 */
      ctx.beginPath(); ctx.arc(d.x, d.y, 2.6, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,200,0,0.85)'; ctx.fill();
    } else {
      /* 안 찍힌 점 — 흰 점, 맥동 (어디서나 찍을 수 있음을 표시) */
      const r = 2.8 + 0.6 * Math.sin(ts * 0.004 + i * 0.3);
      ctx.beginPath(); ctx.arc(d.x, d.y, r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.82)'; ctx.fill();
    }
  }

  /* ⑤ 바늘 그래픽 — 손가락 위치에서 위쪽으로 뻗은 실제 바늘 */
  drawNeedle();
}

// ── HUD ────────────────────────────────────────────────────
function drawHUD(){

  // 진행바 배경
  ctx.fillStyle='rgba(0,0,0,0.38)'; rRect(bx,by,bw,bh,6); ctx.fill();
  // 채우기
  if(prog>0){
    const pg=ctx.createLinearGradient(bx,0,bx+bw,0);
    pg.addColorStop(0,'#ff8800'); pg.addColorStop(1,'#ffcc00');
    ctx.fillStyle=pg; rRect(bx,by,bw*prog,bh,6); ctx.fill();
  }
  ctx.strokeStyle='rgba(255,200,100,0.3)'; ctx.lineWidth=1;
  rRect(bx,by,bw,bh,6); ctx.stroke();

  // 목숨
  ctx.textBaseline='middle';
  for(let i=0;i<MAX_LIVES;i++){
    ctx.globalAlpha=i<lives?1:0.18;
    ctx.font='15px Arial'; ctx.textAlign='left';
    ctx.fillText('🍬',bx+i*21,by-10);
  }
  ctx.globalAlpha=1;

  // 스톱워치 — 경과 시간 표시 (분:초 or 초.소수점)
  ctx.font='bold 16px Arial';
  ctx.fillStyle=C.gold;
  ctx.textAlign='right';
  const et=elapsedTime;
  const timerTxt = et<60
    ? `${et.toFixed(1)}s`
    : `${Math.floor(et/60)}:${String(Math.floor(et%60)).padStart(2,'0')}`;
  ctx.fillText(timerTxt, BASE_W-bx+45, by-9);

  // 카운트 / 전체
  ctx.font='bold 13px Arial'; ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.textAlign='center';
  ctx.fillText(`${hitSet.size} / ${dots.length}`,BASE_W/2,by-9);

  // 모양 이름 + 조작 힌트
  ctx.font='13px Arial'; ctx.fillStyle='rgba(255,200,100,0.6)';
  ctx.textBaseline='bottom';
  ctx.fillText(`${SHAPE_ICO[currentShape]} ${T[lang].shapes[currentShape]}`,BASE_W/2,BASE_H-8);
  // 모바일 힌트 (터치 감지 시에만 표시)
  if('ontouchstart' in window){
    ctx.font='11px Arial'; ctx.fillStyle='rgba(255,255,255,0.22)';
    ctx.fillText(T[lang].touchHint,BASE_W/2,BASE_H-24);
  }
  ctx.textBaseline='alphabetic';

  // 잘못 찍었을 때 빨간 테두리 플래시
  if(wrongFlash>0){
    ctx.save();
    ctx.globalAlpha=wrongFlash*0.55;
    ctx.strokeStyle=C.red; ctx.lineWidth=10;
    ctx.strokeRect(0,0,BASE_W,BASE_H);
    ctx.restore();
    wrongFlash=Math.max(0,wrongFlash-0.07);
  }
}

// ── 파티클 ─────────────────────────────────────────────────
function spawnHit(x,y){
  for(let i=0;i<6;i++){
    const a=Math.random()*Math.PI*2, s=1.2+Math.random()*2.2;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:1.8+Math.random()*2,color:'#ffcc00',life:24+Math.random()*14,max:38});
  }
}
function spawnCrack(x,y){
  for(let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*2.5,color:'#7a4000',life:20+Math.random()*16,max:36});
  }
}
function spawnCelebration(){
  const cols=['#ffcc00','#ff8800','#ff4444','#44ff88','#4488ff','#cc44ff','#fff'];
  for(let i=0;i<90;i++){
    const a=Math.random()*Math.PI*2, s=3+Math.random()*6;
    particles.push({
      x:CANDY_CX+(Math.random()-0.5)*CANDY_R*1.2,
      y:CANDY_CY+(Math.random()-0.5)*CANDY_R*0.8,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s-2.5,
      r:3+Math.random()*4.5,
      color:cols[Math.floor(Math.random()*cols.length)],
      life:60+Math.random()*50, max:110
    });
  }
}
function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.16;p.vx*=0.97;p.vy*=0.97;p.life--;});
}
function drawParticles(){
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life/p.max;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ── 균열 ───────────────────────────────────────────────────
function addCrack(tx,ty){
  let cx=tx,cy=ty; const segs=[];
  for(let i=0;i<4+Math.floor(Math.random()*3);i++){
    const a=Math.random()*Math.PI*2,len=10+Math.random()*20;
    cx+=Math.cos(a)*len; cy+=Math.sin(a)*len;
    segs.push({x:cx,y:cy});
  }
  cracks.push({x1:tx,y1:ty,segs,op:0.9,w:1.6+Math.random()*0.8});
}

// ── 게임 진행 ───────────────────────────────────────────────
function startGame(){
  dots=makePoints(currentShape);
  hitSet=new Set();
  lives=MAX_LIVES; elapsedTime=0; finalScore=0;
  cracks=[]; particles=[]; shakeT=0;
  needleX=-999; needleY=-999; needleAlpha=0;
  wrongFlash=0;

  if(timerID) clearInterval(timerID);
  /* 스톱워치: 0.1초마다 elapsedTime 증가 (시간 초과 없음) */
  timerID=setInterval(()=>{
    if(state==='playing') elapsedTime=Math.round((elapsedTime+0.1)*10)/10;
  },100);

  countdownT=performance.now();
  state='countdown';
}

function endGame(success){
  if(timerID){clearInterval(timerID);timerID=null;}
  if(success){
    const acc=hitSet.size/dots.length;
    /* 점수 = 기본점(점 개수×12) + 완성도 보너스 + 빠른 완성 보너스
       빠를수록 높은 점수: 8000 / (경과시간 + 2) */
    finalScore=Math.round(hitSet.size*12 + acc*200 + Math.round(8000/(elapsedTime+2)));
    pendingSaveTime = elapsedTime;   // 스톱워치 기록 저장
    spawnCelebration();
    state='success';
  } else { state='failed'; }
}

// ── 탭 처리 ─────────────────────────────────────────────────
function handleTap(tx,ty){
  switch(state){
    case 'menu':        menuTap(tx,ty);    break;
    case 'select':      selectTap(tx,ty);  break;
    case 'playing':     gameTap(tx,ty);    break;
    case 'success':     successTap(tx,ty); break;
    case 'failed':      failedTap(tx,ty);  break;
    case 'leaderboard': lbTap(tx,ty);      break;
  }
}

/* 핵심 메카닉: 달고나 바늘 찍기 (순서·위치 자유)
   ✅ 모양 위의 점 — 어디서나, 어떤 순서로든 찍기 가능
   💥 점 근처가 아닌 캔디 몸통 — 찍으면 균열 발생
   → "정확히 선 위를 찍어야 한다"는 긴장감이 핵심 */
function gameTap(tx,ty){
  /* 손가락 위치 저장 → 바늘 그래픽용 */
  needleX=tx; needleY=ty; needleAlpha=1.0;

  /* 실제 hit detection은 바늘 끝 위치 기준 */
  const tip = needleTip(tx, ty);
  const hitR = HIT_R_BASE[currentShape];

  // 바늘 끝에서 가장 가까운 미찍 점 찾기
  let nearestIdx=-1, nearestDist=Infinity;
  dots.forEach((d,i)=>{
    if(hitSet.has(i)) return;
    const dist=Math.hypot(d.x-tip.x, d.y-tip.y);
    if(dist<nearestDist){ nearestDist=dist; nearestIdx=i; }
  });

  if(nearestIdx>=0 && nearestDist<=hitR){
    /* ✅ 바늘 끝이 점 위에 정확히 위치 — 성공 */
    hitSet.add(nearestIdx);
    spawnHit(dots[nearestIdx].x, dots[nearestIdx].y);
    if(hitSet.size>=dots.length) setTimeout(()=>endGame(true),280);
  } else {
    /* 바늘 끝이 캔디 안쪽이지만 점을 빗나감 → 균열 */
    const fromCenter=Math.hypot(tip.x-CANDY_CX, tip.y-CANDY_CY);
    if(fromCenter<CANDY_R-6){
      addCrack(tip.x, tip.y);
      spawnCrack(tip.x, tip.y);
      shakeT=8; wrongFlash=1.0;
      lives--;
      if(lives<=0) setTimeout(()=>endGame(false),480);
    }
  }
}

function menuTap(tx,ty){
  // KO|EN 토글 — 우상단 (각 레이블 탭 감지)
  if(Math.abs(tx-(BASE_W-52))<16 && Math.abs(ty-20)<14){ lang='ko'; localStorage.setItem('dalgona_lang','ko'); updateOverlayLang(); return; }
  if(Math.abs(tx-(BASE_W-24))<16 && Math.abs(ty-20)<14){ lang='en'; localStorage.setItem('dalgona_lang','en'); updateOverlayLang(); return; }
  if(inBtn(tx,ty,BASE_W/2,520,220,54)){state='select';selectedIdx=SHAPES.indexOf(currentShape);}
  if(inBtn(tx,ty,BASE_W/2,592,220,44)){state='leaderboard';}
}
function selectTap(tx,ty){
  SHAPES.forEach((_,i)=>{
    const col=i<4?i%2:0, row=i<4?Math.floor(i/2):2;
    const cx=i<4?(col===0?BASE_W/2-94:BASE_W/2+94):BASE_W/2;
    const cy=165+row*140;
    if(Math.abs(tx-cx)<78&&Math.abs(ty-cy)<58) selectedIdx=i;
  });
  if(inBtn(tx,ty,BASE_W/2,BASE_H-68,200,50)){currentShape=SHAPES[selectedIdx];startGame();}
  if(inBtn(tx,ty,BASE_W/2,BASE_H-18,120,34)) state='menu';
}
function successTap(tx,ty){
  if(inBtn(tx,ty,BASE_W/2,BASE_H*0.86,210,50)){
    pendingSaveScore=finalScore; pendingSaveShape=currentShape;
    // pendingSaveTime은 endGame(true)에서 이미 기록됨
    showNameOverlay();
  }
  if(inBtn(tx,ty,BASE_W/2,BASE_H*0.93,210,38)) startGame();
}
function failedTap(tx,ty){
  if(inBtn(tx,ty,BASE_W/2,BASE_H*0.77,210,50)) startGame();
  if(inBtn(tx,ty,BASE_W/2,BASE_H*0.86,210,42)) state='select';
  if(inBtn(tx,ty,BASE_W/2,BASE_H*0.94,210,36)) state='menu';
}
function lbTap(tx,ty){
  if(inBtn(tx,ty,BASE_W/2,BASE_H-48,180,46)) state='menu';
}

}

function drawShapeGuideAt(shape,cx,cy,sz){
  ctx.save(); ctx.globalAlpha=0.3; ctx.setLineDash([3,4]);
  ctx.strokeStyle='#3d1a00'; ctx.lineWidth=1.5; ctx.beginPath();
  if(shape==='circle') ctx.arc(cx,cy,sz,0,Math.PI*2);
  else if(shape==='triangle'){const v=[{x:cx,y:cy-sz},{x:cx+sz*0.866,y:cy+sz*0.5},{x:cx-sz*0.866,y:cy+sz*0.5}];ctx.moveTo(v[0].x,v[0].y);v.forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();}
  else if(shape==='star'){const total=10,R=sz,r=sz*0.42;for(let i=0;i<total;i++){const a=(i/total)*Math.PI*2-Math.PI/2,rad=i%2===0?R:r,x=cx+Math.cos(a)*rad,y=cy+Math.sin(a)*rad;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.closePath();}
  else if(shape==='heart'){const pts=heartPoints(cx,cy,sz,50);ctx.moveTo(pts[0].x,pts[0].y);pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();}
  else if(shape==='umbrella'){const pts=umbrellaPoints(cx,cy,sz,40);ctx.moveTo(pts[0].x,pts[0].y);pts.forEach(p=>ctx.lineTo(p.x,p.y));}
  ctx.stroke(); ctx.setLineDash([]); ctx.restore();
}

// ── 스크린: 모양 선택 ───────────────────────────────────────
function drawSelect(){
  const tr=T[lang];
  ctx.fillStyle=C.bg; ctx.fillRect(0,0,BASE_W,BASE_H);
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.font='bold 25px Arial'; ctx.fillStyle=C.gold;
  ctx.fillText(tr.selectTitle,BASE_W/2,54);
  ctx.font='13px Arial'; ctx.fillStyle='rgba(255,200,100,0.5)';
  ctx.fillText(tr.selectSub,BASE_W/2,78);

  SHAPES.forEach((shape,i)=>{
    const col=i<4?i%2:0, row=i<4?Math.floor(i/2):2;
    const cx=i<4?(col===0?BASE_W/2-94:BASE_W/2+94):BASE_W/2;
    const cy=165+row*140;
    const sel=i===selectedIdx;
    ctx.fillStyle=sel?'rgba(200,130,10,0.26)':'rgba(255,255,255,0.04)';
    ctx.strokeStyle=sel?C.candyL:'rgba(255,200,100,0.18)';
    ctx.lineWidth=sel?2:1;
    rRect(cx-78,cy-56,156,116,12); ctx.fill(); ctx.stroke();
    ctx.font='32px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(SHAPE_ICO[shape],cx,cy-12);
    ctx.font='bold 14px Arial'; ctx.fillStyle=C.gold; ctx.textBaseline='alphabetic';
    ctx.fillText(tr.shapes[shape],cx,cy+22);
    ctx.font='11px Arial'; ctx.fillStyle='rgba(255,200,100,0.55)';
    const diff=SHAPE_DIF[shape];
    ctx.fillText('⭐'.repeat(diff)+'☆'.repeat(5-diff),cx,cy+42);
    ctx.font='11px Arial'; ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillText(tr.dotsPts(SHAPE_N[shape]),cx,cy+58);
  });

  drawBtn(BASE_W/2,BASE_H-68,200,50,tr.goBtn,C.candy,'#fff');
  drawBtn(BASE_W/2,BASE_H-18,120,34,tr.backBtn,'#3d1a00','rgba(255,200,100,0.7)');
  ctx.textAlign='left';
}

// ── 스크린: 카운트다운 ──────────────────────────────────────
function drawCountdown(ts){
  drawGameScene(ts);
  const elapsed=(ts-countdownT)/1000;
  if(elapsed>=3){ state='playing'; return; }
  const n=Math.max(1,4-Math.ceil(elapsed));
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fillRect(0,0,BASE_W,BASE_H);
  const sc=1+0.35*(1-(elapsed%1));
  ctx.translate(BASE_W/2,BASE_H/2); ctx.scale(sc,sc);
  ctx.font='bold 96px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#ffcc00'; ctx.shadowColor='#ff8800'; ctx.shadowBlur=28;
  ctx.fillText(n===4?T[lang].ready:String(n),0,0);
  ctx.restore();
}

// ── 스크린: 게임 장면 ───────────────────────────────────────
function drawGameScene(ts){
  ctx.fillStyle=C.bg; ctx.fillRect(0,0,BASE_W,BASE_H);

  if(shakeT>0){
    ctx.save();
    ctx.translate((Math.random()-0.5)*shakeT*2.2,(Math.random()-0.5)*shakeT*1.8);
    shakeT--;
  }
  drawCandy(CANDY_CX,CANDY_CY,CANDY_R);
  drawCracks();
  drawShapeGuide(currentShape);
  drawDotsAndTrail(ts);
  if(shakeT>=0) ctx.restore();
  drawParticles();
  drawHUD();
}

// ── 스크린: 성공 ────────────────────────────────────────────
function drawSuccess(){
  ctx.fillStyle=C.bg; ctx.fillRect(0,0,BASE_W,BASE_H);
  drawParticles();
  const cy=BASE_H*0.34;
  drawCandy(CANDY_CX,cy,CANDY_R*0.84);
  ctx.font='50px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(SHAPE_ICO[currentShape],CANDY_CX,cy);
  ctx.textBaseline='alphabetic';
  const trS=T[lang];
  ctx.font='bold 34px Arial'; ctx.fillStyle=C.green;
  ctx.shadowColor=C.green; ctx.shadowBlur=20; ctx.textAlign='center';
  ctx.fillText(trS.successTxt,BASE_W/2,BASE_H*0.6);
  ctx.shadowBlur=0;
  ctx.font='bold 28px Arial'; ctx.fillStyle=C.gold;
  ctx.fillText(`${finalScore}${trS.pts}`,BASE_W/2,BASE_H*0.675);
  ctx.font='14px Arial'; ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText(`⏱ ${elapsedTime.toFixed(1)}${trS.timeSfx}  ·  ${hitSet.size}${trS.doneTxt}`,BASE_W/2,BASE_H*0.73);
  drawBtn(BASE_W/2,BASE_H*0.86,210,50,trS.saveRankBtn,C.candy,'#fff');
  drawBtn(BASE_W/2,BASE_H*0.93,210,38,trS.retryBtn,'#3d1a00',C.gold);
  ctx.textAlign='left';
}

// ── 스크린: 실패 ────────────────────────────────────────────
function drawFailed(){
  ctx.fillStyle=C.bg; ctx.fillRect(0,0,BASE_W,BASE_H);
  ctx.save(); ctx.translate(CANDY_CX,BASE_H*0.34); ctx.rotate(0.08);
  drawCandy(0,0,CANDY_R*0.82); drawCracks();
  ctx.font='38px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('💔',0,0); ctx.restore();
  const trF=T[lang];
  ctx.font='bold 36px Arial'; ctx.fillStyle=C.red;
  ctx.shadowColor=C.red; ctx.shadowBlur=16; ctx.textAlign='center';
  ctx.fillText(trF.failedTxt,BASE_W/2,BASE_H*0.6); ctx.shadowBlur=0;
  ctx.font='15px Arial'; ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText(`${hitSet.size} / ${dots.length} ${trF.doneTxt.trim()}`,BASE_W/2,BASE_H*0.675);
  drawBtn(BASE_W/2,BASE_H*0.77,210,50,trF.retryAgain,C.candy,'#fff');
  drawBtn(BASE_W/2,BASE_H*0.86,210,42,trF.changeShape,'#3d1a00',C.gold);
  drawBtn(BASE_W/2,BASE_H*0.94,210,36,trF.mainMenu,'#1a0800','rgba(255,200,100,0.5)');
  ctx.textAlign='left';
}

// ── 스크린: 랭킹 보드 ───────────────────────────────────────
/* 점수 TOP5 + 속도 TOP5 두 섹션 표시 */
function drawLeaderboard(){
  ctx.fillStyle=C.bg; ctx.fillRect(0,0,BASE_W,BASE_H);
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';

  const trL=T[lang];
  // 타이틀
  ctx.font='bold 24px Arial'; ctx.fillStyle=C.gold;
  ctx.shadowColor=C.candy; ctx.shadowBlur=14;
  ctx.fillText(trL.lbTitle,BASE_W/2,46);
  ctx.shadowBlur=0;

  const scoreTop = getScoreTop5();
  const speedTop = getSpeedTop5();
  const ROW_H    = 44;

  // 두 섹션을 그리는 공통 함수
  function drawSection(title, entries, startY, valueFn, valueSuffix){
    // 섹션 헤더 배경
    ctx.fillStyle='rgba(200,130,10,0.18)';
    rRect(14, startY-22, BASE_W-28, 28, 6); ctx.fill();
    ctx.font='bold 14px Arial'; ctx.fillStyle=C.gold;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(title, BASE_W/2, startY-8);

    if(entries.length===0){
      ctx.font='13px Arial'; ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.fillText(trL.noRecord, BASE_W/2, startY+ROW_H);
      return;
    }

    entries.forEach((e,i)=>{
      const ry = startY + i * ROW_H + 6;
      const top3 = i < 3;

      // 행 배경
      ctx.fillStyle = top3 ? 'rgba(200,130,10,0.14)' : 'rgba(255,255,255,0.03)';
      rRect(14, ry, BASE_W-28, ROW_H-4, 7); ctx.fill();

      // 메달 / 순위
      const medal = ['🥇','🥈','🥉'][i] || `${i+1}`;
      ctx.font = top3 ? 'bold 18px Arial' : '14px Arial';
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillStyle='#fff';
      ctx.fillText(medal, 24, ry+(ROW_H-4)/2);

      // 닉네임
      ctx.font = top3 ? 'bold 14px Arial' : '13px Arial';
      ctx.fillStyle = top3 ? C.gold : 'rgba(255,255,255,0.85)';
      ctx.fillText(e.name, 62, ry+12);

      // 모양 + 날짜
      ctx.font='11px Arial'; ctx.fillStyle='rgba(255,200,100,0.45)';
      ctx.fillText(`${SHAPE_ICO[e.shape]||''} ${trL.shapes[e.shape]||''}  ${e.date}`, 62, ry+28);

      // 값 (점수 or 시간)
      ctx.textAlign='right';
      ctx.font = top3 ? 'bold 17px Arial' : '14px Arial';
      ctx.fillStyle = top3 ? C.gold : 'rgba(255,255,255,0.8)';
      ctx.fillText(`${valueFn(e)}${valueSuffix}`, BASE_W-18, ry+(ROW_H-4)/2);
    });
  }

  // 섹션 1 — 점수 TOP 5
  const sec1Y = 80;
  drawSection(trL.scoreTop, scoreTop, sec1Y,
              e => e.score, trL.pts);

  // 섹션 2 — 속도 TOP 5
  const sec2Y = sec1Y + 26 + 5 * ROW_H + 18;
  drawSection(trL.speedTop, speedTop, sec2Y,
              e => e.time, trL.timeSfx);

  // 메인 메뉴 버튼
  const btnY = sec2Y + 26 + 5 * ROW_H + 28;
  drawBtn(BASE_W/2, btnY, 180, 44, trL.backMenu, '#3d1a00', C.gold);

  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

// ── 입력 이벤트 ────────────────────────────────────────────
function getXY(e){
  const r=canvas.getBoundingClientRect();
  let x, y;
  if(e.touches){ x=(e.touches[0].clientX-r.left)/scale; y=(e.touches[0].clientY-r.top)/scale; }
  else          { x=(e.clientX-r.left)/scale;            y=(e.clientY-r.top)/scale;            }
  /* guard: scale=0 등으로 Infinity/NaN이 되면 화면 중앙으로 대체 */
  if(!isFinite(x)||!isFinite(y)) return {x:BASE_W/2, y:BASE_H/2};
  return {x, y};
}
/* 탭/클릭 — 실제 게임 입력 */
/* ── 터치 메카닉 (모바일) ─────────────────────────────────────
   PC  : mousemove로 바늘 미리보기 → mousedown으로 히트 판정 (기존 유지)
   모바일: touchstart/touchmove로 바늘 조준 → touchend(손 뗄 때)에 히트 판정
   → 손가락을 올리면 바늘이 나타나고, 드래그로 정확히 조준한 뒤
     손을 떼는 순간 찍힘. 바늘 끝이 손가락 위에 표시되므로 드래그 중에도 보임. */

/* touchstart: 바늘 즉시 표시 (히트 판정 없음 — 아직 조준 중) */
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const{x,y}=getXY(e);
  needleX=x; needleY=y; needleAlpha=1.0;
},{passive:false});

/* touchmove: 드래그하며 조준 — 실시간 바늘 업데이트 */
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const{x,y}=getXY(e);
  needleX=x; needleY=y; needleAlpha=1.0;
},{passive:false});

/* touchend: 손 떼는 순간 히트 판정 (e.touches는 비어있으므로 저장된 위치 사용) */
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  handleTap(needleX, needleY);
},{passive:false});

/* touchcancel: 전화 수신 등 — 판정 없이 바늘만 유지 */
canvas.addEventListener('touchcancel',e=>{ e.preventDefault(); },{passive:false});

/* ── 마우스 (PC) ─────────────────────────────────────────────
   mousemove로 바늘 미리보기 → mousedown으로 히트 판정 (변경 없음) */
canvas.addEventListener('mousedown',e=>{
  const{x,y}=getXY(e);
  handleTap(x,y);
});

canvas.addEventListener('mousemove',e=>{
  if(state==='playing'){
    const{x,y}=getXY(e);
    needleX=x; needleY=y; needleAlpha=1.0;
  }
});

// ── 메인 루프 ───────────────────────────────────────────────
function loop(ts){
  ctx.clearRect(0,0,BASE_W,BASE_H);
  if(state!=='menu') updateParticles();
  switch(state){
    case 'menu':        drawMenu(ts);       break;
    case 'select':      drawSelect();        break;
    case 'countdown':   drawCountdown(ts);   break;
    case 'playing':     drawGameScene(ts);   break;
    case 'success':     drawSuccess();       break;
    case 'failed':      drawFailed();        break;
    case 'leaderboard': drawLeaderboard();   break;
  }
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
